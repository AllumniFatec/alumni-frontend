name: Deploy to VPS (Dokploy)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login no Docker Hub (ou seu registry)
        uses: docker/login-action@v3
        with:
          # Se usar Docker Hub:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          # Se usar GitHub Container Registry, troque por:
          # registry: ghcr.io
          # username: ${{ github.actor }}
          # password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configura Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da imagem
        uses: docker/build-push-action@v5
        with:
          context: .
          dockerfile: Dockerfile
          push: true
          # Troque SEU_USUARIO/alumni-frontend pelo seu repo no Docker Hub
          # Ou ghcr.io/${{ github.repository }} para GHCR
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/alumni-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/alumni-frontend:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_APP_NAME=${{ secrets.NEXT_PUBLIC_APP_NAME }}
            NEXT_PUBLIC_APP_VERSION=${{ secrets.NEXT_PUBLIC_APP_VERSION }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy no Dokploy via webhook
        run: |
          curl --fail -X POST "${{ secrets.DOKPLOY_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d '{"token": "${{ secrets.DOKPLOY_WEBHOOK_TOKEN }}"}'
